name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      LBUG_VERSION: main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test
